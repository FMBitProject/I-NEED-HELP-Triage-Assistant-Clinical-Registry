version: "2"
type: frontend
tech_stack:
  - TypeScript
  - Next.js 16 (App Router, Turbopack)
  - React 19
  - Tailwind CSS
  - shadcn/ui (Radix UI primitives)
  - better-auth (email/password sessions, rate limiting, admin-managed accounts)
  - Drizzle ORM
  - Neon Serverless Postgres
  - Recharts
  - Vitest (unit tests for triage scoring engine)
routes:
  - path: /
    file: src/app/page.tsx
    auth_required: false
    description: Splash/redirect screen that sends signed-in users to /dashboard and everyone else to /login
  - path: /login
    file: src/app/login/page.tsx
    auth_required: false
    description: Doctor login with email/password
  - path: /register
    file: src/app/register/page.tsx
    auth_required: false
    description: Doctor self-registration with institution type, consent checkbox, and regulatory disclosure
  - path: /dashboard
    file: src/app/dashboard/page.tsx
    auth_required: true
    description: Personal stats (total patients, referral rate, GDMT compliance, pending follow-ups), 6-month enrollment chart, recent patients, GDMT audit, pending follow-up reminders
  - path: /triage/new
    file: src/app/triage/new/page.tsx
    auth_required: true
    description: Two-step wizard - Step 1 patient profile/vitals/comorbidities/labs/GDMT status, Step 2 the 9-criterion I-NEED-HELP checklist with live score
  - path: /triage/[id]/result
    file: src/app/triage/[id]/result/page.tsx
    auth_required: true
    description: Shows the triage score, REFER vs CONTINUE_GDMT recommendation, criteria met, GDMT status, and clinical guidance; can print
  - path: /patients
    file: src/app/patients/page.tsx
    auth_required: true
    description: Searchable, filterable (all/referred/continue-gdmt/pending-followup/full-gdmt), paginated patient list
  - path: /patients/[id]
    file: src/app/patients/[id]/page.tsx
    auth_required: true
    description: Patient detail with triage result, outcome, audit trail, edit/delete/finalize/retriage actions
  - path: /patients/[id]/edit
    file: src/app/patients/[id]/edit/page.tsx
    auth_required: true
    description: Edit a patient's baseline data (locked once the record is finalized)
  - path: /patients/[id]/followup
    file: src/app/patients/[id]/followup/page.tsx
    auth_required: true
    description: Record/update the 30-day clinical outcome (stable/hospitalized/referred/deceased/lost-to-followup) with admission/discharge dates
  - path: /patients/[id]/retriage
    file: src/app/patients/[id]/retriage/page.tsx
    auth_required: true
    description: Re-run the I-NEED-HELP checklist for an existing patient to log a new triage event
  - path: /followup
    file: src/app/followup/page.tsx
    auth_required: true
    description: List of all patients needing vs. already having a follow-up outcome, tabbed pending/done
  - path: /export
    file: src/app/export/page.tsx
    auth_required: true
    description: ADMIN-only research data export - download the full registry as CSV (patients/triage/outcomes)
  - path: /admin/users
    file: src/app/admin/users/page.tsx
    auth_required: true
    description: ADMIN-only doctor account management - approve pending sign-ups and force-reset another doctor's password (temp password shown once)
  - path: /settings
    file: src/app/settings/page.tsx
    auth_required: true
    description: Profile info, change-own-password, ethical clearance number/date, delete-own-account (with patient data)
  - path: /privacy-policy
    file: src/app/privacy-policy/page.tsx
    auth_required: false
    description: Static privacy policy page
  - path: /terms
    file: src/app/terms/page.tsx
    auth_required: false
    description: Static terms of service page
features:
  - name: Doctor Registration
    description: A new doctor signs up with name, email, password, institution type/name, and must check a regulatory consent box. New accounts are created unapproved.
    files:
      - src/app/register/page.tsx
      - src/contexts/auth-context.tsx
      - src/lib/auth.ts
    entry_route: /register
    user_interactions:
      - Fill name, email, password fields
      - Select institution type from dropdown, optionally type institution name
      - Expand and read the full consent statement
      - Check the consent checkbox
      - Click "Daftar & Mulai Triase" to submit
      - See inline validation error if consent or institution type is missing
    api_calls:
      - method: POST
        endpoint: /api/auth/sign-up/email
    auth_required: false
  - name: Doctor Login
    description: Email/password sign-in for an existing doctor account
    files:
      - src/app/login/page.tsx
      - src/contexts/auth-context.tsx
    entry_route: /login
    user_interactions:
      - Fill email and password
      - Toggle password visibility
      - Click "Masuk" to submit
      - See an inline error banner on invalid credentials
    api_calls:
      - method: POST
        endpoint: /api/auth/sign-in/email
    auth_required: false
  - name: Pending-Approval Gate
    description: Doctors whose account has not yet been approved by an admin are blocked from every page except login/register/settings/privacy/terms, and see a "Menunggu Persetujuan Admin" screen instead.
    files:
      - src/components/pending-approval-gate.tsx
      - src/lib/api-auth.ts
    entry_route: /dashboard
    user_interactions:
      - Log in as a freshly-registered (unapproved) doctor
      - Get redirected/blocked on any non-allow-listed route
      - Click "Keluar" to log out from the pending screen
    api_calls:
      - method: GET
        endpoint: /api/patients
      - method: GET
        endpoint: /api/dashboard
    auth_required: true
  - name: I-NEED-HELP Triage Wizard
    description: Two-step intake that records a patient's baseline profile then scores the 9 I-NEED-HELP criteria to recommend REFER (score >= 1) or CONTINUE_GDMT (score 0)
    files:
      - src/app/triage/new/page.tsx
      - src/lib/triage.ts
      - src/app/api/patients/route.ts
      - src/app/api/triage/route.ts
    entry_route: /triage/new
    user_interactions:
      - Step 1: fill patient initial, age, gender, NYHA class, vitals (systolic/diastolic BP, heart rate, LVEF), comorbidities, optional labs (eGFR, NT-proBNP), current GDMT medications
      - Click "Lanjut ke Skor I-NEED-HELP" (blocked with inline errors if required fields are missing)
      - Step 2: check any of the 9 I-NEED-HELP criteria (I, N, E1, E2, D, H, E3, L, P), see live score update
      - Click "Lihat Hasil Triase" to submit
    api_calls:
      - method: POST
        endpoint: /api/patients
      - method: POST
        endpoint: /api/triage
    auth_required: true
  - name: Triage Result & Recommendation
    description: Displays the computed score, REFER/CONTINUE_GDMT banner, which criteria were met, GDMT pillar status, and PERKI-guideline-based clinical recommendations
    files:
      - src/app/triage/[id]/result/page.tsx
    entry_route: /triage/new
    user_interactions:
      - View the result banner, score, and met criteria
      - Click "Set Follow-up" to go set an outcome
      - Click "Triase Baru" to start another triage
      - Click "Cetak Hasil" to print
    api_calls:
      - method: GET
        endpoint: /api/triage/[id]
    auth_required: true
  - name: Patient List, Search & Filter
    description: Browse all of a doctor's own patients with search by initial and filters for referred/continue-GDMT/pending-followup/full-GDMT, paginated 20 per page
    files:
      - src/app/patients/page.tsx
      - src/app/api/patients/route.ts
    entry_route: /patients
    user_interactions:
      - Type in the search box to filter by patient initial
      - Click a filter chip (Semua/Rujukan/Lanjut GDMT/Perlu Follow-up/GDMT Lengkap)
      - Click a patient card to open detail
      - Click Prev/Next to paginate
    api_calls:
      - method: GET
        endpoint: /api/patients
    auth_required: true
  - name: Patient Detail, Edit, Delete, Finalize, Retriage
    description: View full patient record with triage/outcome/audit history; edit baseline data (only before finalization); permanently lock the record; delete the patient; or run a new triage event
    files:
      - src/app/patients/[id]/page.tsx
      - src/app/patients/[id]/edit/page.tsx
      - src/app/patients/[id]/retriage/page.tsx
      - src/app/api/patients/[id]/route.ts
      - src/app/api/patients/[id]/finalize/route.ts
      - src/app/api/patients/[id]/audit/route.ts
    entry_route: /patients
    user_interactions:
      - Click Edit to change baseline fields (disabled once finalized)
      - Click Finalize, confirm, to lock the record permanently
      - Click Delete, confirm, to permanently remove the patient and all related data
      - Click Retriage to log a new I-NEED-HELP assessment for the same patient
      - Expand the audit trail to see create/update/finalize history
    api_calls:
      - method: GET
        endpoint: /api/patients/[id]
      - method: PUT
        endpoint: /api/patients/[id]
      - method: DELETE
        endpoint: /api/patients/[id]
      - method: POST
        endpoint: /api/patients/[id]/finalize
      - method: GET
        endpoint: /api/patients/[id]/audit
    auth_required: true
  - name: Follow-up / Outcome Tracking
    description: Record a patient's 30-day clinical outcome (stable/hospitalized/referred/deceased/lost-to-followup) with admission/discharge dates and a not-referred reason when applicable
    files:
      - src/app/patients/[id]/followup/page.tsx
      - src/app/followup/page.tsx
      - src/app/api/outcomes/route.ts
      - src/app/api/outcomes/[id]/route.ts
    entry_route: /followup
    user_interactions:
      - Switch between "Belum Follow-up" and "Selesai" tabs
      - Click Update/Edit on a patient row to set or change the outcome status
      - Pick admission/discharge dates (validated: discharge cannot be before admission)
      - Provide a reason when a REFER recommendation was not actually followed
    api_calls:
      - method: POST
        endpoint: /api/outcomes
      - method: PUT
        endpoint: /api/outcomes/[id]
    auth_required: true
  - name: Personal Dashboard & GDMT Audit
    description: Doctor's own stats - total patients, referral rate, GDMT compliance rate, pending follow-up count, 6-month enrollment trend chart, per-drug GDMT adherence bars
    files:
      - src/app/dashboard/page.tsx
      - src/app/api/dashboard/route.ts
    entry_route: /dashboard
    user_interactions:
      - View summary stat cards
      - View the monthly enrollment bar chart
      - Click "Lihat Semua" to go to the full patient list
      - Click "Update Sekarang" on the pending-followup banner
    api_calls:
      - method: GET
        endpoint: /api/patients
    auth_required: true
  - name: Settings - Profile, Change Password, Ethical Clearance, Delete Account
    description: View profile info, change own password (revokes other sessions), save/edit ethical clearance number and date, or permanently delete the account and all its patient data
    files:
      - src/app/settings/page.tsx
      - src/app/api/profile/route.ts
      - src/app/api/account/route.ts
    entry_route: /settings
    user_interactions:
      - Fill current password, new password, confirm new password, click "Simpan Password Baru"
      - See inline error if new password is under 8 chars, confirmation mismatches, or current password is wrong
      - Fill/save ethical clearance number and date
      - Click "Hapus Akun Saya", confirm, type "HAPUS AKUN SAYA" to permanently delete the account
    api_calls:
      - method: POST
        endpoint: /api/auth/change-password
      - method: PATCH
        endpoint: /api/profile
      - method: DELETE
        endpoint: /api/account
    auth_required: true
  - name: Admin - Approve Doctors & Reset Passwords
    description: ADMIN-only page listing every doctor account; approve a pending sign-up with one click, or force-reset another doctor's password (a one-time temp password is shown, all of that doctor's sessions are revoked). An admin cannot reset their own password here (must use Settings) and cannot be force-approved (always implicitly allowed).
    files:
      - src/app/admin/users/page.tsx
      - src/app/api/admin/users/route.ts
      - src/app/api/admin/users/[id]/approve/route.ts
      - src/app/api/admin/users/[id]/reset-password/route.ts
      - src/lib/api-auth.ts
    entry_route: /admin/users
    user_interactions:
      - Click "Setujui" on a pending doctor's row
      - Click "Reset Password" on another doctor's row (not shown for your own row), confirm, copy the shown temp password
      - Non-admin users attempting to visit this route are redirected to /dashboard
    api_calls:
      - method: GET
        endpoint: /api/admin/users
      - method: POST
        endpoint: /api/admin/users/[id]/approve
      - method: POST
        endpoint: /api/admin/users/[id]/reset-password
    auth_required: true
  - name: Admin - Research Data Export
    description: ADMIN-only CSV export of the full pseudoanonymized registry (patients, triage scores/criteria, outcomes) for statistical analysis
    files:
      - src/app/export/page.tsx
      - src/app/api/export/route.ts
    entry_route: /export
    user_interactions:
      - View registry summary stats (total patients, referrals, with-outcome, full-GDMT)
      - Click a dataset's "Unduh" button or "Unduh Semua Dataset Sekaligus" to download CSV
    api_calls:
      - method: GET
        endpoint: /api/export
    auth_required: true
  - name: Client-side Error Reporting
    description: Render-time errors (error.tsx/global-error.tsx) and event-handler/async/unhandled-promise-rejection errors (window listeners) are forwarded to a logging endpoint so they're visible server-side instead of only in the user's own browser console
    files:
      - src/app/error.tsx
      - src/app/global-error.tsx
      - src/components/error-reporter.tsx
      - src/lib/report-client-error.ts
      - src/app/api/log-client-error/route.ts
    entry_route: /dashboard
    user_interactions:
      - Trigger a render error and see a friendly "Terjadi Kesalahan" fallback with a "Coba Lagi" retry button
    api_calls:
      - method: POST
        endpoint: /api/log-client-error
    auth_required: false
known_limitations:
  - issue: Rate limiting (better-auth, sign-in/sign-up/change-password capped at 3 attempts/10s) uses in-memory storage
    location: src/lib/auth.ts
    impact: Per-serverless-instance only on Vercel, not a hard global cap under sustained/distributed brute-force load
  - issue: No email-based password reset flow
    location: src/app/admin/users/page.tsx
    impact: A locked-out doctor must be reset manually by an admin and told the temp password out-of-band (e.g. WhatsApp); there is no self-service "forgot password" email link
  - issue: /api/log-client-error is unauthenticated by necessity, throttled only by a simple per-IP in-memory counter (20/min)
    location: src/app/api/log-client-error/route.ts
    impact: Same per-instance-memory caveat as the auth rate limiter; freeform attacker-controlled text can still reach server logs within the throttle window
  - issue: Pending-approval allow-list matching uses path-prefix comparison
    location: src/components/pending-approval-gate.tsx
    impact: A future route whose path begins with an allowed prefix (e.g. something starting with "/settings") would be unintentionally reachable pre-approval
